<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Portal | PeerBridge</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="student">
  <header class="navbar">
    <a href="index.html" class="logo">PeerBridge</a>
    <div style="display:flex;align-items:center;gap:0.25rem;">
      <button id="mobileNotifBell" class="notif-bell mobile-only" aria-label="Notifications" style="display:none;">🔔<span id="mobileNotifDot" class="dot hidden"></span></button>
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
    </div>
    <nav id="mainNav">
      <a href="student.html">Community</a>
      <a href="sessions.html">Sessions</a>
      <a href="profile.html">Profile</a>
      <button id="navNotifBell" class="notif-bell" aria-haspopup="true" aria-expanded="false">🔔<span id="navNotifDot" class="dot hidden"></span></button>
      <a href="index.html" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h1 id="dashboardTitle">Hello, Peer!</h1>
      <p class="subtitle">What would you like to do today?</p>
      <div class="dashboard-actions">
        <div class="action-card">
          <h3>Learn</h3>
          <p>Find peers who can help you improve in subjects you're learning.</p>
          <button id="findTutorsBtn" class="btn">Find Tutors</button>
        </div>
        <div class="action-card">
          <h3>Teach</h3>
          <p>Help fellow students by sharing knowledge in subjects you're confident in.</p>
          <button id="helpStudentsBtn" class="btn">Help Students</button>
        </div>
      </div>

      <div id="resultsContainer" class="list" style="margin-top:1rem;"></div>
    </section>
  </main>

  <script type="module" src="script.js"></script>
  <div id="modalContainer" class="modal-container hidden" aria-hidden="true"></div>
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>
</body>
</html>
